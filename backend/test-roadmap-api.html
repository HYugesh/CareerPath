<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap API Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 239, 125, 0.4);
        }
        
        .btn-info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .btn-info:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }
        
        .response {
            margin-top: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            border: 2px solid #ddd;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .response pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .success {
            border-color: #38ef7d;
            background: #f0fff4;
        }
        
        .error {
            border-color: #f5576c;
            background: #fff5f5;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .status-success {
            background: #38ef7d;
            color: white;
        }
        
        .status-error {
            background: #f5576c;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Roadmap API Tester</h1>
            <p>Test all roadmap API endpoints with your authentication token</p>
        </div>
        
        <div class="content">
            <!-- Token Section -->
            <div class="section">
                <h2>🔑 Authentication Token</h2>
                <div class="input-group">
                    <label for="token">Your JWT Token (from localStorage):</label>
                    <input type="text" id="token" placeholder="Paste your token here...">
                </div>
                <p style="color: #666; font-size: 13px; margin-top: 10px;">
                    💡 Tip: Open browser console on your app and run: <code>localStorage.getItem('token')</code>
                </p>
            </div>
            
            <!-- API Base URL -->
            <div class="section">
                <h2>🌐 API Base URL</h2>
                <div class="input-group">
                    <label for="baseUrl">Base URL:</label>
                    <input type="text" id="baseUrl" value="http://localhost:5001">
                </div>
            </div>
            
            <!-- Test Endpoints -->
            <div class="section">
                <h2>🧪 Test Endpoints</h2>
                <div class="btn-group">
                    <button class="btn-primary" onclick="testEndpoint('/api/roadmaps/health', 'GET', false)">
                        Health Check (No Auth)
                    </button>
                    <button class="btn-success" onclick="testEndpoint('/api/roadmaps/test-auth', 'GET', true)">
                        Test Authentication
                    </button>
                    <button class="btn-info" onclick="testEndpoint('/api/roadmaps/test-requirements', 'GET', true)">
                        Check Requirements
                    </button>
                    <button class="btn-warning" onclick="testEndpoint('/api/roadmaps/test-create', 'GET', true)">
                        Test Roadmap Generation
                    </button>
                </div>
                
                <div class="btn-group" style="margin-top: 15px;">
                    <button class="btn-primary" onclick="testEndpoint('/api/roadmaps', 'GET', true)">
                        Get All Roadmaps
                    </button>
                    <button class="btn-success" onclick="testEndpoint('/api/roadmaps', 'POST', true)">
                        Create Roadmap
                    </button>
                </div>
            </div>
            
            <!-- Response Section -->
            <div class="section">
                <h2>📋 Response <span id="statusBadge"></span></h2>
                <div id="response" class="response">
                    <pre>Click a button above to test an endpoint...</pre>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        async function testEndpoint(endpoint, method = 'GET', requiresAuth = true) {
            const token = document.getElementById('token').value.trim();
            const baseUrl = document.getElementById('baseUrl').value.trim();
            const responseDiv = document.getElementById('response');
            const statusBadge = document.getElementById('statusBadge');
            
            // Check token if required
            if (requiresAuth && !token) {
                responseDiv.className = 'response error';
                responseDiv.innerHTML = '<pre>❌ Error: Please enter your authentication token first!</pre>';
                statusBadge.innerHTML = '<span class="status-badge status-error">ERROR</span>';
                return;
            }
            
            // Show loading
            responseDiv.className = 'response';
            responseDiv.innerHTML = '<div class="loading"></div> <span style="margin-left: 10px;">Loading...</span>';
            statusBadge.innerHTML = '';
            
            try {
                const headers = {
                    'Content-Type': 'application/json'
                };
                
                if (requiresAuth) {
                    headers['Authorization'] = `Bearer ${token}`;
                }
                
                const options = {
                    method: method,
                    headers: headers
                };
                
                const url = `${baseUrl}${endpoint}`;
                console.log(`Testing: ${method} ${url}`);
                
                const response = await fetch(url, options);
                const data = await response.json();
                
                // Display response
                const isSuccess = response.ok;
                responseDiv.className = isSuccess ? 'response success' : 'response error';
                
                const result = {
                    status: response.status,
                    statusText: response.statusText,
                    url: url,
                    method: method,
                    timestamp: new Date().toISOString(),
                    data: data
                };
                
                responseDiv.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
                statusBadge.innerHTML = `<span class="status-badge ${isSuccess ? 'status-success' : 'status-error'}">${response.status} ${response.statusText}</span>`;
                
            } catch (error) {
                responseDiv.className = 'response error';
                responseDiv.innerHTML = `<pre>❌ Network Error:\n\n${error.message}\n\nMake sure:\n1. Backend server is running on ${baseUrl}\n2. CORS is enabled\n3. URL is correct</pre>`;
                statusBadge.innerHTML = '<span class="status-badge status-error">NETWORK ERROR</span>';
                console.error('Test error:', error);
            }
        }
        
        // Auto-fill token from localStorage if available
        window.addEventListener('load', () => {
            const savedToken = localStorage.getItem('token');
            if (savedToken) {
                document.getElementById('token').value = savedToken;
                console.log('✅ Token auto-filled from localStorage');
            }
        });
    </script>
</body>
</html>
